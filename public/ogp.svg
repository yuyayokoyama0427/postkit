<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2f4a"/>
    </linearGradient>
    <linearGradient id="card-x" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d9bf0"/>
      <stop offset="100%" stop-color="#0a84d0"/>
    </linearGradient>
    <linearGradient id="card-ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="card-th" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="45" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="300" cy="180" r="200" fill="#1d9bf0" opacity="0.08" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="180" fill="#f97316" opacity="0.07" filter="url(#glow)"/>

  <!-- X card -->
  <g transform="translate(620, 60)" filter="url(#shadow)">
    <rect width="240" height="180" rx="14" fill="url(#card-x)"/>
    <text x="20" y="46" font-family="'Helvetica Neue', sans-serif" font-size="26" font-weight="900" fill="white">X</text>
    <text x="54" y="38" font-family="sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)">&#31295;&#31295;&#12503;&#12524;&#12499;&#12517;&#12540;</text>
    <rect x="54" y="44" width="72" height="17" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="90" y="56" font-family="monospace" font-size="10" fill="white" text-anchor="middle">280&#25991;&#23383;</text>
    <rect x="20" y="76" width="200" height="8" rx="4" fill="rgba(255,255,255,0.45)"/>
    <rect x="20" y="92" width="160" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
    <rect x="20" y="108" width="185" height="8" rx="4" fill="rgba(255,255,255,0.28)"/>
    <rect x="20" y="134" width="200" height="5" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="134" width="124" height="5" rx="3" fill="rgba(255,255,255,0.8)"/>
    <text x="220" y="130" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="end">172/280</text>
  </g>

  <!-- Instagram card -->
  <g transform="translate(880, 40)" filter="url(#shadow)">
    <rect width="240" height="210" rx="14" fill="url(#card-ig)"/>
    <rect x="18" y="18" width="26" height="26" rx="7" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="31" cy="31" r="6" fill="none" stroke="white" stroke-width="1.8"/>
    <circle cx="44" cy="18" r="2.5" fill="white"/>
    <text x="54" y="30" font-family="sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)">Instagram</text>
    <rect x="54" y="36" width="80" height="17" rx="9" fill="rgba(255,255,255,0.2)"/>
    <text x="94" y="48" font-family="monospace" font-size="10" fill="white" text-anchor="middle">2,200&#25991;&#23383;</text>
    <rect x="20" y="70" width="200" height="8" rx="4" fill="rgba(255,255,255,0.45)"/>
    <rect x="20" y="86" width="175" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
    <rect x="20" y="102" width="190" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
    <rect x="20" y="132" width="200" height="5" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="132" width="48" height="5" rx="3" fill="rgba(255,255,255,0.8)"/>
    <text x="220" y="128" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="end">480/2200</text>
    <rect x="20" y="156" width="38" height="18" rx="9" fill="rgba(255,255,255,0.25)"/>
    <text x="39" y="169" font-family="sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Pro</text>
  </g>

  <!-- Threads card -->
  <g transform="translate(750, 270)" filter="url(#shadow)">
    <rect width="240" height="170" rx="14" fill="url(#card-th)"/>
    <text x="18" y="46" font-family="serif" font-size="28" font-weight="900" fill="white">@</text>
    <text x="54" y="36" font-family="sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)">Threads</text>
    <rect x="54" y="42" width="68" height="17" rx="9" fill="rgba(255,255,255,0.15)"/>
    <text x="88" y="54" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">500&#25991;&#23383;</text>
    <rect x="20" y="72" width="200" height="8" rx="4" fill="rgba(255,255,255,0.38)"/>
    <rect x="20" y="88" width="145" height="8" rx="4" fill="rgba(255,255,255,0.28)"/>
    <rect x="20" y="114" width="200" height="5" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="20" y="114" width="88" height="5" rx="3" fill="rgba(255,255,255,0.7)"/>
    <text x="220" y="110" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="end">220/500</text>
    <rect x="20" y="135" width="38" height="18" rx="9" fill="rgba(255,255,255,0.18)"/>
    <text x="39" y="148" font-family="sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Pro</text>
  </g>

  <!-- Left: Main text block -->
  <text x="72" y="210" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2" opacity="0.97">PostKit</text>

  <text x="76" y="268" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.75)">SNS&#25295;&#31295;&#12503;&#12524;&#12499;&#12517;&#12540;&#12484;&#12540;&#12523;</text>

  <rect x="76" y="292" width="44" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>

  <text x="76" y="338" font-family="sans-serif" font-size="17" fill="rgba(255,255,255,0.62)">&#25991;&#23383;&#25968;&#12459;&#12454;&#12531;&#12488;</text>
  <text x="76" y="362" font-family="sans-serif" font-size="17" fill="rgba(255,255,255,0.62)">&#12473;&#12524;&#12483;&#12489;&#33258;&#21205;&#20998;&#21106;</text>
  <text x="76" y="386" font-family="sans-serif" font-size="17" fill="rgba(255,255,255,0.62)">&#12486;&#12531;&#12503;&#12524;&#12540;&#12488;&#20445;&#23384;</text>

  <!-- Free badge -->
  <rect x="76" y="420" width="170" height="30" rx="15" fill="rgba(29,155,240,0.25)" stroke="rgba(29,155,240,0.5)" stroke-width="1"/>
  <text x="161" y="440" font-family="sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.9)" text-anchor="middle">&#28961;&#26009; &#183; &#12452;&#12531;&#12473;&#12488;&#12540;&#12523;&#19981;&#35201;</text>

  <!-- URL -->
  <rect x="76" y="526" width="220" height="32" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="186" y="547" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.75)" text-anchor="middle">postkit.vercel.app</text>
</svg>
